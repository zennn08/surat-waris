version: "2"
sql:
  - engine: "sqlite"
    schema: "internal/db/schema.sql"
    queries: "internal/db/queries.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        json_tags_case_style: "snake"
        # sqlc menyingkat nama tabel non-Inggris jadi aneh (BerkasWari, Pewari,
        # AhliWari, Hartum). Paksa nama model yang benar.
        rename:
          berkas_wari: "BerkasWaris"
          pewari: "Pewaris"
          ahli_wari: "AhliWaris"
